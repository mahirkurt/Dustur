<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 560" width="800" height="560" font-family="Albert Sans, sans-serif">
  <title>Düstur · UI Yüzey Anatomy</title>
  <desc>Annotated diagram of a Düstur surface — tier border, masthead, badge, page title, body. References tokens.</desc>

  <!-- Page bg -->
  <rect x="0" y="0" width="800" height="560" fill="#FAF6EE"/>

  <!-- Surface -->
  <g transform="translate(120,40)">
    <rect x="0" y="0" width="500" height="480" fill="#FFFFFF" stroke="#D8D1C4" stroke-width="1"/>

    <!-- Tier border -->
    <rect x="0" y="0" width="500" height="6" fill="#1A8B8C"/>

    <!-- Masthead -->
    <g transform="translate(0,6)">
      <rect x="0" y="0" width="500" height="40" fill="#F3EEE2"/>
      <text x="20" y="25" font-size="10" font-weight="600" fill="#4A4744">T.C. Mevzuat</text>
      <text x="490" y="25" text-anchor="end" font-family="Recursive,monospace" font-size="9" fill="#807A72">v2026-01-15</text>
    </g>

    <!-- Badge -->
    <g transform="translate(24,70)">
      <rect x="0" y="0" width="80" height="20" fill="#D7EDEE" stroke="#94CFD0" stroke-width="1"/>
      <text x="40" y="14" text-anchor="middle" font-size="9" font-weight="700" letter-spacing="2" fill="#0C5455">KANUN</text>
    </g>

    <!-- Kanun no + madde no -->
    <text x="120" y="84" font-family="Recursive,monospace" font-size="11" font-weight="600" fill="#1A1A1A">5237</text>
    <text x="160" y="84" font-family="Recursive,monospace" font-size="10" fill="#137070">Madde 220</text>

    <!-- Page title -->
    <text x="24" y="140" font-family="Fraunces,serif" font-size="32" font-weight="700" fill="#1A1A1A" letter-spacing="-0.5">Suç işlemek amacıyla</text>
    <text x="24" y="172" font-family="Fraunces,serif" font-size="32" font-weight="700" fill="#1A1A1A" letter-spacing="-0.5">örgüt kurma</text>

    <!-- Body -->
    <g transform="translate(24,200)" font-family="Fraunces,serif" font-size="11" fill="#1A1A1A">
      <text x="0" y="0">(1) Kanunun suç saydığı fiilleri işlemek amacıyla örgüt</text>
      <text x="0" y="18">kuranlar veya yönetenler, örgütün yapısı bakımından</text>
      <text x="0" y="36">amaç suçları işlemeye elverişli olması halinde...</text>
    </g>
    <g transform="translate(24,280)" font-family="Fraunces,serif" font-size="11" fill="#1A1A1A">
      <text x="0" y="0">(2) Suç işlemek amacıyla kurulmuş olan örgüte</text>
      <text x="0" y="18">üye olanlar, iki yıldan dört yıla kadar hapis cezası...</text>
    </g>

    <!-- Cross-ref link sample -->
    <text x="24" y="360" font-family="Fraunces,serif" font-size="11" fill="#1A1A1A">(4) ...</text>
    <text x="54" y="360" font-family="Fraunces,serif" font-size="11" fill="#137070" text-decoration="underline">Bkz. Madde 221</text>
  </g>

  <!-- Annotations (right side) -->
  <g font-family="Recursive,monospace" font-size="9" fill="#807A72">

    <!-- Tier border annotation -->
    <line x1="620" y1="46" x2="660" y2="46" stroke="#807A72" stroke-width="0.5"/>
    <line x1="660" y1="46" x2="660" y2="80" stroke="#807A72" stroke-width="0.5"/>
    <text x="668" y="64" font-weight="600" fill="#1A1A1A">① TIER BORDER</text>
    <text x="668" y="78">--tcm-kanun-mark</text>
    <text x="668" y="92">3px solid · TURKUVAZ-9</text>

    <!-- Masthead -->
    <line x1="620" y1="66" x2="660" y2="66" stroke="#807A72" stroke-width="0.5" stroke-dasharray="2,2"/>
    <text x="668" y="116" font-weight="600" fill="#1A1A1A">② MASTHEAD</text>
    <text x="668" y="130">--tcm-panel-subtle</text>

    <!-- Badge -->
    <line x1="180" y1="90" x2="180" y2="200" stroke="#807A72" stroke-width="0.5" stroke-dasharray="2,2"/>
    <text x="668" y="158" font-weight="600" fill="#1A1A1A">③ ROZET</text>
    <text x="668" y="172">.yuzey-badge.kanun</text>
    <text x="668" y="186">→ {tier.kanun.rozet-bg}</text>
    <text x="668" y="200">→ {tier.kanun.rozet-text}</text>

    <!-- Page title -->
    <line x1="500" y1="160" x2="660" y2="160" stroke="#807A72" stroke-width="0.5" stroke-dasharray="2,2"/>
    <text x="668" y="226" font-weight="600" fill="#1A1A1A">④ PAGE TITLE</text>
    <text x="668" y="240">Fraunces · opsz 72</text>
    <text x="668" y="254">wght 700 · SOFT 18 · WONK 1</text>

    <!-- Body -->
    <line x1="500" y1="240" x2="660" y2="240" stroke="#807A72" stroke-width="0.5" stroke-dasharray="2,2"/>
    <text x="668" y="280" font-weight="600" fill="#1A1A1A">⑤ MADDE BODY</text>
    <text x="668" y="294">Fraunces · opsz 14</text>
    <text x="668" y="308">wght 400 · 10.5pt · LH 1.62</text>

    <!-- Cross-ref -->
    <line x1="500" y1="400" x2="660" y2="400" stroke="#807A72" stroke-width="0.5" stroke-dasharray="2,2"/>
    <text x="668" y="334" font-weight="600" fill="#1A1A1A">⑥ CROSS-REF LINK</text>
    <text x="668" y="348">.akn-ref</text>
    <text x="668" y="362">color: --tcm-link-default</text>
    <text x="668" y="376">→ {color.turkuvaz.10}</text>
  </g>

  <!-- Footer -->
  <text x="120" y="540" font-family="Recursive,monospace" font-size="8" fill="#807A72" letter-spacing="2">DÜSTUR · YÜZEY ANATOMY · BÖLÜM V · 5.1</text>
</svg>
