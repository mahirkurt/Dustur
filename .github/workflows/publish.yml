name: Publish · NPM Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: "Versiyon (örn. 1.2.1) · package.json güncellenir ve tag oluşturulur"
        type: string
        required: false
      dry-run:
        description: "Dry run (publish etmeden simüle et)"
        type: boolean
        default: false

jobs:
  publish:
    name: Publish to NPM + GitHub Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write   # npm provenance için
      packages: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'

      - name: Install deps
        run: npm ci

      - name: Install xmllint (AKN validation için)
        run: sudo apt-get update && sudo apt-get install -y libxml2-utils

      - name: Verify (lint + audit + build)
        run: npm run verify

      - name: Bump version + create tag (workflow_dispatch)
        if: github.event_name == 'workflow_dispatch' && inputs.version != ''
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          npm version ${{ inputs.version }} --no-git-tag-version
          git add package.json package-lock.json
          git commit -m "chore(release): v${{ inputs.version }}"
          git tag -a "v${{ inputs.version }}" -m "v${{ inputs.version }}"
          git push origin HEAD:main
          git push origin "v${{ inputs.version }}"

      - name: Pack (tarball oluştur)
        run: npm pack

      - name: NPM publish (dry-run veya real)
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [ "${{ inputs.dry-run }}" = "true" ]; then
            npm publish --dry-run
          else
            npm publish --provenance --access public
          fi

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'workflow_dispatch' && inputs.version != '' && inputs.dry-run == false)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.version != '' && format('v{0}', inputs.version) || github.ref_name }}
          generate_release_notes: true
          files: |
            dustur-tasarim-sistemi-*.tgz
            dist/web/tcm-tokens.css
            dist/web/tcm-tokens.css.map
            dist/dtcg/tcm-tokens.json
            dist/ios/TCMTokens.swift
            dist/android/colors.xml
            dist/android/dimens.xml
            dist/reports/contrast.json
            dist/reports/colorblind.json
          body: |
            ## Düstur · NPM Publish

            Türkiye Cumhuriyeti mevzuat sisteminin tasarım sistemi.

            ### Yükleme

            ```bash
            npm install @dustur/tasarim-sistemi
            ```

            ```html
            <link rel="stylesheet" href="https://unpkg.com/@dustur/tasarim-sistemi/css/dustur.css">
            ```

            Tam değişiklik listesi: [`CHANGELOG.md`](./CHANGELOG.md)
