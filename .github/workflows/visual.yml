name: Visual Regression

on:
  pull_request:
    branches: [main]
    paths:
      - 'css/**'
      - 'examples/**'
      - 'tokens/**'
      - 'assets/fonts/subset/**'

jobs:
  visual:
    name: Visual diff vs main
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install deps
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Checkout baseline from main
        run: |
          mkdir -p dist/visual/baseline
          git show main:dist/visual/baseline 2>/dev/null || echo "No baseline on main yet"

      - name: Run visual regression
        run: node scripts/visual-regression.mjs --strict
        continue-on-error: true
        id: visual

      - name: Upload screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: visual-diff-${{ github.sha }}
          path: |
            dist/visual/
            dist/reports/visual.json
          retention-days: 14

      - name: Comment on PR
        if: steps.visual.outcome == 'failure'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const report = JSON.parse(fs.readFileSync('dist/reports/visual.json', 'utf8'));
            const diffs = report.results.filter(r => r.action === 'diff' && (r.pctChanged > 1 || !r.sameSize));
            const body = `## 📸 Visual Regression Tespit Edildi\n\n${diffs.length} sayfada anlamlı görsel değişiklik var.\n\n` +
              diffs.map(d => `- **${d.page}**: ${d.pctChanged ? d.pctChanged + '% piksel değişti' : 'boyut farkı'}`).join('\n') +
              `\n\nDetay için [artifact](../actions/runs/${context.runId}) indirin.`;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body
            });
